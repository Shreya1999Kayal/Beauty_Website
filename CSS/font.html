<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Font</title>
    
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Bitcount Prop Single|Oswald|Edu NSW ACT Hand Cursive|Kanit&effect=neon|outline|fire|"> 
  <!--google fonts -->
    <style>
        p.bt{
            font-weight: bold;
            font-size: 10vw;
            font-family:"Oswald", sans-serif;
            text-shadow: 7px 7px 7px rgb(204, 39, 39);

        }


        p.st{
            font-weight: 700;
            font-size: 200px;
            
        }

        p.lt{
            font-weight:lighter;
            font-variant: normal;
            font-size: 150px;
            font-family:"Kanit", sans-serif;
        }

        p.nt{
            font-weight:300;
            font-variant: small-caps;
            font-size: 3em;
            font-family:"Bitcount Prop Single", serif;

        }
        .font{
            font: 50px "Times New Roman", serif;
            text-transform:capitalize;
            text-indent: 100px;
            letter-spacing: 14px;
        }

        .baseline{
            vertical-align: baseline;
        }
        .sub{
            vertical-align: sub;
        }
    </style>
</head>
<body>
    <p class="bt font-effect-neon">Bold Text</p>
    <p class="st font-effect-outline">Cursive Text</p>
    <p class="lt font-effect-fire">lighter</p>
    <p class="nt">Normal Text</p>
    <p class="font">Font size and font family Lorem ipsum </p>
    <p><img src="/photos in css/india flag.png" alt="In" class="baseline" height="20px" width="20px">Baseline image </p>
    <p><img src="/photos in css/india flag.png" alt="In" class="sub" height="20px" width="20px">sub image </p>
    
</body>
</html>
