<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List</title>
    <style>
        #a {
            list-style-type: circle;
            list-style-position: outside;
            background-color: rgb(28, 216, 216);
            padding: 14px;
            padding-left: 30px;
            margin-left: 30px;
            width: 30%;
            left: 0;
            right: 0;
            border-left: 12px solid rgb(73, 179, 255);
            border-top: 2px solid rgb(18, 143, 232);
            border-right: 2px solid rgb(59, 162, 236);
            border-bottom: 2px solid rgb(72, 168, 237);


        }

        #b {
            list-style-type: upper-alpha;
            list-style-position: outside;
            background-color: rgb(168, 244, 161);
            padding: 30px;
            padding-left: 40px;
            margin-left: 50px;
            width: 50%;
            border-left: 12px solid rgb(236, 144, 115);
            border-top: 2px solid rgb(233, 106, 67);
            border-right: 2px solid rgb(236, 112, 74);
            border-bottom: 2px solid rgb(236, 112, 74);

        }

        #a li {
            background-color: rgb(245, 180, 226);
            padding-left: 10px;
            padding-top: 5px;
            padding-bottom: 5px;
            border-left: 12px solid rgba(231, 160, 217, 0.81);
            font-size: large;
            font-family: cursive;
            border-bottom: 1px dotted rgb(4, 59, 59);


        }

        #b li {

            background-color: rgb(115, 197, 238);
            padding: 20px;
            color: rgb(0, 0, 0);
            margin: 5px;
            border-left: 12px solid rgb(89, 109, 245);
            border-top: 2px solid rgb(82, 104, 250);
            border-right: 2px solid rgb(83, 106, 252);
            border-bottom: 2px solid rgb(74, 96, 240);

        }

        #fat {
            color: rgb(254, 84, 228);
            text-decoration: underline;
            text-decoration-color: aqua;
        }

        #protein {
            color: rgb(91, 255, 206);
            text-decoration: underline;
            text-decoration-color: rgb(139, 252, 90);
        }
    </style>
</head>

<body>
    <h1 id="fat">Fat based food<br></h1>
    <ul id="a">
        <li>oil </li>
        <li>butter </li>
        <li>ghee </li>
    </ul>

    <h1 id="protein">Protein based food</h1>
    <ol id="b">
        <li>milk </li>
        <li>fish </li>
        <li>egg </li>
    </ol>


</body>

</html>
