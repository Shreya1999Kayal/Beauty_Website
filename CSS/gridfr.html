<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid fr</title>
    <style>
        .grid-container {
            display: grid;
            background-color: aqua;
            /* height: 700px; */
             grid-template-columns: repeat(4, 1fr);
            /*grid-template-rows: 100px 300px 80px; */
            /* justify-content: end; */
            /* place-content:end space-between; */

            gap: 25px;
        }

        .grid-container>div {
             border: 2px solid black;
            /*background-color: rgb(250, 254, 254);
            padding: 10px;
             */
        }

        .item1{
            align-self: start;
        }
         .item2{
            align-self: center;
        }
    </style>

</head>

<body>
    <div class="grid-container">
        <div class="item1">Monday</div>
        <div class="item2">Tuesday</div>
        <div class="item3">Wednesday</div>
        <div class="item4">Thursday</div>
        <div class="item5">Friday</div>
        <div class="item6">Saturday</div>
        <div class="item7">Sunday</div>

       

       
    </div>
</body>


</html>
