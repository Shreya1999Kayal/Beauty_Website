<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Icon</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css">
</head>
<body>
   <p style="font-size:25px;color:rgb(20, 2, 60); padding: 12px; font-weight: bold;"><u>Bootstrap Icon</u></p>
   <span class="glyphicon glyphicon-cloud" style="font-size:25px;color:rgb(101, 213, 226); padding-left: 12px;"> </span> 
   <span class="glyphicon glyphicon-remove" style="font-size:25px;color:rgb(247, 7, 7);"> </span>
   <span class="glyphicon glyphicon-user" style="font-size:25px;color:rgb(235, 185, 116);"> </span>
   <span class="glyphicon glyphicon-envelope" style="font-size:25px;color:rgb(9, 211, 144);"> </span>
   <span class="glyphicon glyphicon-thumbs-up" style="font-size:25px;color:rgb(84, 135, 231);"> </span>
   <span class="glyphicon glyphicon-star" style="font-size:25px;color:rgb(235, 243, 10); padding-left: 12px;"> </span> 
   <span class="glyphicon glyphicon-star-empty" style="font-size:25px;color:rgb(241, 238, 7);"> </span>
   <span class="glyphicon glyphicon-home" style="font-size:25px;color:rgb(4, 4, 4);"> </span>
   <span class="glyphicon glyphicon-time" style="font-size:25px;color:rgb(58, 7, 189);"> </span>
   <span class="glyphicon glyphicon-map-marker" style="font-size:25px;color:rgb(210, 89, 13);"> </span>
</body>
</html>
