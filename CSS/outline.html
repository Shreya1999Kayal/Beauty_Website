<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Outline</title>
    <style>
        p{
            
            outline-width: 20px;
            width:50%;
            padding:20px;
            margin: 20px;
            border: 2px solid black;
            
        }
        .a {
            outline-style: dashed;
            outline-width:thin;
            outline-color: red;
        }

        .b {
            outline-style: dotted;
            outline-width:medium;
            outline-color: rgb(15, 226, 61);
        }

        .c {
            outline-style: double;
            outline-width:thick;
            outline-color: #034f73;
        }

        .d {
            outline-style: groove;
            outline-width:15pt;
            outline-color: hsl(124, 81%, 59%);
        }

        .e {
            outline-style: inset;
            outline-width:15px;
            
        }

        .f {
            outline-style:outset;
        }

        .g {
            outline-style:solid;
        }

        .h {
            outline-style:ridge;
            
           
        }

        .i {
            outline-style:none;
            
           
        }

        .j{
            outline: green dashed thick;
            outline-offset: 20px;
            margin: 25px;
        }
    </style>
</head>

<body>
    <h1>Outline </h1>
    <p class="a">Dashed Outline</p>
    <br/>
    <br/>
    <p class="b">Dotted Outline</p>
    <br/>
    <br/>
    <p class="c">Double Outline</p>
    <br/>
    <br/>
    <p class="d">Groove Outline</p>
    <br/>
    <br/>
    <p class="e">Inset Outline</p>
    <br/>
    <br/>
    <p class="f">Outset Outline</p>
    <br/>
    <br/>
    <p class="g">Solid Outline</p>
    <br/>
    <br/>
    <p class="h">Ridge Outline</p>
    <br/>
    <br/>
    <p class="i">No Outline</p>
    <br/>
    <br/>
    <p class="j">Only Outline shorthand</p>

    
</body>

</html>
