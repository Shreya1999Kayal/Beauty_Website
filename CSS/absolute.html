<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absolute</title>
    <style>
        .container{
            position: relative;
            width:300px;
            height:200px;
            background-color: aqua;
            border: 2px solid red;
            margin-bottom: 40px; 
        }

        .relative-box{
               position: relative;
               background-color:rgb(152, 152, 241);
               color:black;
               padding:10px;
               top:20px;
               left:30px;
        }

        .absolute-box{
               position: absolute;
               background-color:rgb(152, 152, 241);
               color:black;
               padding:10px;
               top:20px;
               left:30px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="relative-box"></div>
    </div>
    <div class="container">
        <div class="absolute-box"></div>
    </div>
</body>
</html>
