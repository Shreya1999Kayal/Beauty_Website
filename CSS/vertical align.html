<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vertical-align</title>
    <style>
       .baseline{
        vertical-align: baseline;
        
       }
       .sub{
        vertical-align: sub;
        
       }
       .sup{
        vertical-align:super;
        
       }
       .text-top{
        vertical-align:text-top;
        
       }
       .text-bottom{
        vertical-align:text-bottom;
        
       }

    </style>
</head>
<body>
    <p style="text-decoration-line: overline;text-decoration-color: red;text-decoration-style:dashed;text-decoration-thickness:5px ; text-transform: capitalize; "><img src="/photos in css/india flag.png" alt="India" height="8px" width="8px" class="baseline"> India flag baseline</p>
    <p style="text-decoration-line: underline;text-decoration-color: blue;text-decoration-style:dotted;text-transform:uppercase; "> <img src="/photos in css/india flag.png" alt="India" height="8px" width="8px" class="sub"> India flag sub </p>
     <p style="text-decoration-line: overline underline;text-decoration-color: rgb(39, 207, 9);text-decoration-style:solid;text-transform: lowercase;"><img src="/photos in css/india flag.png" alt="India" height="8px" width="8px" class="sup"> India flag super</p>
     <p style="text-decoration-line: line-through; text-decoration-color: rgb(224, 6, 213);text-decoration-style:wavy;text-decoration-thickness:5px ;"><img src="/photos in css/india flag.png" alt="India" height="8px" width="8px" class="text-top"> India flag text-top </p>
    <p style="text-decoration: underline rgb(63, 203, 42) double 2.5px; "><img src="/photos in css/india flag.png" alt="India" height="8px" width="8px" class="text-bottom"> India flag text-bottom </p>
</body>
</html>
