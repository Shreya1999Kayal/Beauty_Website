<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link button</title>
    <style>
        a:link {
            background-color: rgb(78, 78, 234);
            color: blanchedalmond;
            text-decoration: none;
            padding: 20px;
            margin: 25px;
            display: inline-block;
        }

        a:visited {
            background-color: rgb(121, 232, 10);
            color: rgb(74, 46, 3);
            text-decoration: none;
            padding: 20px;
            margin: 25px;
            display: inline-block;

        }

        a:hover {
            background-color: rgb(31, 60, 3);
            color: blanchedalmond;
            text-decoration: underline;
            padding: 20px;
            margin: 25px;
            font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
            font-size: 30px;
            display: inline-block;
            cursor:move;
        }

        a:active {
            background-color: rgb(239, 9, 9);
            color: blanchedalmond;
            text-decoration: none;
            padding: 20px;
            margin: 25px;
            display: inline-block;
            
        }
    </style>
</head>

<body>
    <a href="https://www.flaticon.com/free-icons/bullet" target="_blank"> click Here</a>
</body>

</html>
