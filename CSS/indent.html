<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indent</title>
    <style>
        .indent{
            text-indent: 100px;
            letter-spacing: 5px;
            line-height: 250%;
            word-spacing: 25px;
            white-space:nowrap;
            
        }
        h1{
            letter-spacing: 5px;
            text-shadow: 2px 2px 4px rgb(52, 212, 20), 4px 5px 6px rgb(59, 86, 237) ;
            color:rgb(9, 9, 9);
        }
    </style>
</head>
<body>
    <p class="indent">Lorem ipsum dolor sit, amet consectetur adipisicing elit. <br/> Laborum necessitatibus neque reprehenderit maxime. Inventore voluptatibus pariatur exercitationem quos sed illo.</p>
    <h1>HI Hello Hey</h1>
</body>
</html>
