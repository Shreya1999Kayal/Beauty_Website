<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form</title>
     <link rel="icon" type="image/x-icon"
        href="https://storage-prtl-co.imgix.net/endor/articles/2980/images/1633441351_shutterstock_101441320.jpg?max-w=660&max-h=532&fit=crop&q=40" />
    <style>
        label {
            font-weight: bold;
            font-family: Arial;
            color: rgb(228, 227, 242);
            font-style: normal;
        }

        label:hover {
            color: rgb(227, 246, 134)
        }

        h1 {
            color: rgb(5, 109, 19);
            font-size: 40px;
            text-decoration: underline;
            margin-left: 350px;
        }

        h1:hover {
            color: rgba(140, 15, 6, 0.819)
        }

        #st{
            background-color: rgba(71, 227, 9, 0.819)
        }

        
        #st:hover{
            background-color: rgba(4, 20, 196, 0.819)
        }

    </style>
</head>

<body style="background-color: rgb(239, 208, 167);">
    <h1><u>Login Form</u></h1>
    <form action="/Globalwarming.html">
        <fieldset style="width: 60%; background-color: rgb(19, 4, 80);">
            <br />
            <br />
            <br />
            <label for="User name" style="margin-left:250px">User Name: </label>
            <input type="text" id="User name" name="User name" placeholder="Enter User name" autofocus required
                border:2px double rgb(159, 204, 234)>
            <br />
            <br />
            <label for="PW" style="margin-left:250px"> Password- </label>
            <input type="password" id="PW" name="PW" placeholder="Enter password">
            <br />
            <br />
            <input type="submit" value="Submit" name="Submit"
                style="font-family:Arial; color:rgb(1, 30, 44);font-weight:bold; margin-left:350px;" id="st">
        </fieldset>
    </form>
</body>

</html>
